name: ReviewLoom CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  backend-ci:
    name: Backend CI (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore Dependencies
        run: dotnet restore backend/ReviewLoom.slnx

      - name: Build Backend
        run: dotnet build backend/ReviewLoom.slnx --configuration Release --no-restore

      # - name: Run Tests
      #   run: dotnet test backend/ReviewLoom.slnx --configuration Release --no-build --verbosity normal

  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Next.js Lint & Typecheck
        working-directory: ./frontend
        run: npm run lint --if-present

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: 'http://localhost:5275/api/v1' # Placeholder for build-time env
