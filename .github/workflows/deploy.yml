name: ReviewLoom CD Pipeline (Auto Deploy Backend to Somee)

on:
  push:
    branches:
      - develop # Tự động chạy deploy khi push hoặc merge PR vào nhánh main

jobs:
  deploy-backend:
    name: Deploy Backend to Somee
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Tạo file appsettings.Production.json động từ GitHub Secrets trước khi build/publish
    - name: Create appsettings.Production.json from Secrets
      run: |
        cat << 'EOF' > backend/src/ReviewLoom.Api/appsettings.Production.json
        ${{ secrets.APPSETTINGS_PRODUCTION_JSON }}
        EOF

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Publish ASP.NET Core Web API
      run: |
        dotnet publish backend/src/ReviewLoom.Api/ReviewLoom.Api.csproj -c Release -o ./publish

    # Đưa ứng dụng vào trạng thái offline để giải phóng khóa file DLL trên IIS
    - name: Put App Offline (Create app_offline.htm)
      shell: python
      run: |
        import ftplib
        import io
        import time
        ftp = ftplib.FTP('${{ secrets.SOMEE_FTP_SERVER }}')
        ftp.login('${{ secrets.SOMEE_FTP_USERNAME }}', '${{ secrets.SOMEE_FTP_PASSWORD }}')
        
        # Nếu thư mục root trên Somee của bạn khác reviewloom.somee.com/, hãy cập nhật tại đây
        ftp.cwd('reviewloom.somee.com/')
        
        offline_html = "<html><head><meta charset='utf-8'></head><body><div style='text-align:center;margin-top:10%;font-family:sans-serif;'><h1>Hệ thống đang được cập nhật</h1><p>ReviewLoom đang nâng cấp phiên bản mới. Vui lòng quay lại sau vài phút.</p></div></body></html>"
        ftp.storbinary('STOR app_offline.htm', io.BytesIO(offline_html.encode('utf-8')))
        ftp.quit()
        print("Đã đưa ứng dụng vào trạng thái offline.")
        time.sleep(10)

    # Tự động đồng bộ hóa thư mục compiled lên FTP Server của Somee
    - name: FTP Deploy to Somee
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.SOMEE_FTP_SERVER }}
        username: ${{ secrets.SOMEE_FTP_USERNAME }}
        password: ${{ secrets.SOMEE_FTP_PASSWORD }}
        local-dir: ./publish/
        server-dir: reviewloom.somee.com/ # đường dẫn thư mục root trên Somee của bạn
        dangerous-clean-slate: false

    # Đưa ứng dụng online trở lại (Xóa app_offline.htm)
    - name: Bring App Online (Delete app_offline.htm)
      if: always()
      shell: python
      run: |
        import ftplib
        ftp = ftplib.FTP('${{ secrets.SOMEE_FTP_SERVER }}')
        ftp.login('${{ secrets.SOMEE_FTP_USERNAME }}', '${{ secrets.SOMEE_FTP_PASSWORD }}')
        ftp.cwd('reviewloom.somee.com/')
        try:
            ftp.delete('app_offline.htm')
            print("Đã đưa ứng dụng hoạt động online trở lại.")
        except Exception as e:
            print("Không tìm thấy app_offline.htm hoặc có lỗi xảy ra:", e)
        ftp.quit()
